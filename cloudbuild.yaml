steps:
  # ── Backend ──────────────────────────────────────────
  # 1. Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$COMMIT_SHA'
      - './backend'

  # 2. Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$COMMIT_SHA'

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        for i in 1 2 3; do
          gcloud run deploy live-commerce-api \
            --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$COMMIT_SHA \
            --region=asia-southeast1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=NODE_ENV=production,CORS_ORIGIN=https://live-commerce-web-416645281925.asia-southeast1.run.app \
            --set-secrets=JWT_SECRET=jwt-secret:latest \
            --memory=512Mi \
            --timeout=300 \
          && break || sleep 10
        done

  # ── Frontend ─────────────────────────────────────────
  # 4. Build frontend image (inject API URL)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=https://live-commerce-api-416645281925.asia-southeast1.run.app/api'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$COMMIT_SHA'
      - './frontend'

  # 5. Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$COMMIT_SHA'

  # 6. Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        for i in 1 2 3; do
          gcloud run deploy live-commerce-web \
            --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$COMMIT_SHA \
            --region=asia-southeast1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
          && break || sleep 10
        done

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
