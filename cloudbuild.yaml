options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-southeast1
  _DATABASE_URL: ""
  _CORS_ORIGIN: ""
  _VITE_API_URL: "https://live-commerce-api-416645281925.asia-southeast1.run.app/api"

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build backend image
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$SHORT_SHA
      - ./backend

  - name: gcr.io/cloud-builders/docker
    id: Push backend image
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy backend service
    entrypoint: bash
    args:
      - -ceu
      - |
        for i in 1 2 3; do
          gcloud run deploy live-commerce-api \
            --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$SHORT_SHA \
            --region=$_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets=JWT_SECRET=jwt-secret:latest \
            --set-env-vars=NODE_ENV=production,DATABASE_URL=$_DATABASE_URL,CORS_ORIGIN=$_CORS_ORIGIN && break
          if [ "$i" -eq 3 ]; then
            echo "Backend deploy failed after retries"
            exit 1
          fi
          echo "Backend deploy conflict/transient error, retrying in 10s..."
          sleep 10
        done

  - name: gcr.io/cloud-builders/docker
    id: Build frontend image
    args:
      - build
      - -f
      - frontend/Dockerfile
      - --build-arg
      - VITE_API_URL=$_VITE_API_URL
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$SHORT_SHA
      - ./frontend

  - name: gcr.io/cloud-builders/docker
    id: Push frontend image
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy frontend service
    entrypoint: bash
    args:
      - -ceu
      - |
        for i in 1 2 3; do
          gcloud run deploy live-commerce-web \
            --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$SHORT_SHA \
            --region=$_REGION \
            --platform=managed \
            --allow-unauthenticated && break
          if [ "$i" -eq 3 ]; then
            echo "Frontend deploy failed after retries"
            exit 1
          fi
          echo "Frontend deploy conflict/transient error, retrying in 10s..."
          sleep 10
        done

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-api:$SHORT_SHA
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/live-commerce-web:$SHORT_SHA
